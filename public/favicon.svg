<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fundo preto arredondado -->
  <rect width="32" height="32" rx="7" fill="#111111"/>
  <!-- Corpo do drone -->
  <ellipse cx="16" cy="16" rx="5" ry="3" fill="#C9A84C"/>
  <!-- Braço esquerdo -->
  <rect x="4" y="14.5" width="7" height="2" rx="1" fill="#C9A84C" opacity="0.8"/>
  <!-- Braço direito -->
  <rect x="21" y="14.5" width="7" height="2" rx="1" fill="#C9A84C" opacity="0.8"/>
  <!-- Hélice esquerda -->
  <ellipse cx="6" cy="14" rx="4" ry="1.2" fill="#C9A84C" opacity="0.5"/>
  <!-- Hélice direita -->
  <ellipse cx="26" cy="14" rx="4" ry="1.2" fill="#C9A84C" opacity="0.5"/>
  <!-- Lente da câmera -->
  <circle cx="16" cy="16" r="2" fill="#111111"/>
  <circle cx="16" cy="16" r="1" fill="#C9A84C" opacity="0.6"/>
</svg>
